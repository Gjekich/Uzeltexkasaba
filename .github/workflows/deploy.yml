name: Deploy Uzeltexkasaba to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            if [ ! -d "/var/www/Uzeltexkasaba" ]; then
              mkdir -p /var/www
              git clone https://github.com/Gjekich/Uzeltexkasaba.git /var/www/Uzeltexkasaba
            fi
            cd /var/www/Uzeltexkasaba
            git pull origin main
            docker-compose down
            docker-compose up --build -d
