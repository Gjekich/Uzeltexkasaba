version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uzeltex_backend
    restart: always
    volumes:
      - uzeltex_db_data:/data
      - uzeltex_uploads_data:/app/static/uploads
    environment:
      - DATABASE_URL=sqlite:////data/uzeltexkasaba.db
      - SECRET_KEY=UzElTexKasaba2026!VeryStrongSecretKey
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: uzeltex_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

volumes:
  uzeltex_db_data:
  uzeltex_uploads_data:
