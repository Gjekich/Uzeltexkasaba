<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangilik Tafsilotlari - UzeltexKasaba</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <style>
        .detail-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .detail-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-content {
            padding: 40px;
        }
        .detail-meta {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 500;
        }
        .detail-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.3;
            margin-bottom: 24px;
        }
        .detail-body {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .back-btn-container {
            margin-top: 32px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        .detail-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 16px;
            margin-top: 32px;
            margin-bottom: 16px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        .gallery-title {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            color: var(--color-primary);
            margin-bottom: 16px;
            grid-column: 1 / -1;
            font-weight: 700;
        }
        .gallery-item {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .gallery-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }
        .lightbox.open {
            display: flex;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 80%;
            object-fit: contain;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        @media(max-width: 768px) {
            .detail-img {
                height: 250px;
            }
            .detail-content {
                padding: 24px;
            }
            .detail-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="images/logo.jpg" alt="UzeltexKasaba Logo" style="height: 42px; width: 42px; object-fit: contain; border-radius: 50%;">
                <span>UzeltexKasaba</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link" data-i18n="nav_home">Bosh sahifa</a></li>
                <li><a href="about.html" class="nav-link" data-i18n="nav_about">Haqimizda</a></li>
                <li><a href="news.html" class="nav-link active" data-i18n="nav_news">Yangiliklar</a></li>
                <li><a href="events.html" class="nav-link" data-i18n="nav_events">Tadbirlar</a></li>
                <li><a href="privileges.html" class="nav-link" data-i18n="nav_privileges">Imtiyozlar</a></li>
                <li><a href="legislation.html" class="nav-link" data-i18n="nav_legislation">Qonunchilik</a></li>
                <li><a href="gallery.html" class="nav-link" data-i18n="nav_gallery">Galereya</a></li>
            </ul>
            <div class="lang-switcher" style="margin-left: 12px; display: flex; align-items: center;">
                <select class="lang-select" style="background-color: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 4px 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; outline: none; transition: border-color 0.2s;">
                    <option value="uz">🇺🇿 UZ</option>
                    <option value="ru">🇷🇺 RU</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
            </div>
            <a href="https://t.me/uzeltexkasaba" target="_blank" style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background-color: var(--color-primary); color: white; text-decoration: none; transition: background-color 0.2s; margin-left: 12px;" onmouseover="this.style.backgroundColor='#0088cc'" onmouseout="this.style.backgroundColor='var(--color-primary)'" title="Telegram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </a>
        </div>
    </header>

    <!-- Main Content Section -->
    <section class="section">
        <div class="container">
            <div id="detailContainer">
                <div style="text-align: center; padding: 60px 0; color: var(--text-muted);">Yuklanmoqda...</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <p>&copy; 2026 UzeltexKasaba. Barcha huquqlar himoyalangan.</p>
                <a href="https://t.me/uzeltexkasaba" target="_blank" style="display: flex; align-items: center; gap: 8px; color: var(--color-primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    Telegram kanalimiz
                </a>
            </div>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="app.js?v=1.3"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                loadNewsDetail(id);
            } else {
                showError("Yangilik tanlanmagan.");
            }
        });

        async function loadNewsDetail(id) {
            const container = document.getElementById('detailContainer');
            try {
                const response = await fetch(`/api/news/${id}`);
                if (response.ok) {
                    const news = await response.json();
                    
                    // Update document title
                    document.title = `${news.title} - UzeltexKasaba`;
                    
                    const date = new Date(news.created_at).toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric' });
                    
                    // Parse multiple images
                    const images = news.image_url ? news.image_url.split(',').filter(x => x) : [];
                    const featuredImg = images.length > 0 ? images[0] : '';
                    const imgHtml = `<img class="detail-img" src="${featuredImg || 'images/default_news.jpg'}" alt="${escapeHTML(news.title)}">`;
                    
                    // Create gallery HTML
                    let galleryHtml = '';
                    if (images.length > 1) {
                        const galleryItems = images.map((url, idx) => {
                            return `<img class="gallery-item" src="${url}" alt="Rasm ${idx + 1}" onclick="openLightbox('${url}')">`;
                        }).join('');
                        
                        galleryHtml = `
                            <div class="detail-gallery">
                                <h4 class="gallery-title">Rasm galereyasi (${images.length} rasm)</h4>
                                ${galleryItems}
                            </div>
                        `;
                    }
                    
                    container.innerHTML = `
                        <div class="detail-wrapper">
                            ${imgHtml}
                            <div class="detail-content">
                                <div class="detail-meta">
                                    <span>📅 ${date}</span>
                                    <span>🏷️ Faoliyat</span>
                                </div>
                                <h1 class="detail-title">${escapeHTML(news.title)}</h1>
                                <div class="detail-body">${escapeHTML(news.content)}</div>
                                ${galleryHtml}
                                <div class="back-btn-container">
                                    <a href="news.html" class="btn btn-secondary">⬅️ Barcha yangiliklarga qaytish</a>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    showError("Yangilik topilmadi yoki o'chirib yuborilgan.");
                }
            } catch (error) {
                console.error(error);
                showError("Server bilan bog'lanishda xatolik yuz berdi.");
            }
        }

        function openLightbox(url) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = url;
            lightbox.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('open');
            document.body.style.overflow = 'auto';
        }

        function showError(message) {
            const container = document.getElementById('detailContainer');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 0;">
                    <div style="font-size: 3rem; margin-bottom: 16px;">⚠️</div>
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--color-danger); margin-bottom: 8px;">Xatolik</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">${message}</p>
                    <a href="news.html" class="btn btn-primary">Yangiliklar sahifasiga qaytish</a>
                </div>
            `;
        }
    </script>
    
    <!-- Lightbox for full screen image viewing -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <button class="lightbox-close">&times;</button>
        <img id="lightboxImg" class="lightbox-img" src="" alt="Kattalashtirilgan rasm">
    </div>
</body>
</html>
