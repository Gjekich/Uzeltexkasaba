<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangilik Tafsilotlari - UzeltexKasaba</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <style>
        .detail-wrapper {
            max-width: 800px;
            margin: 0 auto;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .detail-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-bottom: 1px solid var(--border-color);
        }
        .detail-content {
            padding: 40px;
        }
        .detail-meta {
            display: flex;
            gap: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 500;
        }
        .detail-title {
            font-family: var(--font-heading);
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--color-primary);
            line-height: 1.3;
            margin-bottom: 24px;
        }
        .detail-body {
            color: var(--text-secondary);
            font-size: 1.05rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .back-btn-container {
            margin-top: 32px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }
        @media(max-width: 768px) {
            .detail-img {
                height: 250px;
            }
            .detail-content {
                padding: 24px;
            }
            .detail-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="images/logo.jpg" alt="UzeltexKasaba Logo" style="height: 42px; width: 42px; object-fit: contain; border-radius: 50%;">
                <span>UzeltexKasaba</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Bosh sahifa</a></li>
                <li><a href="about.html" class="nav-link">Haqimizda</a></li>
                <li><a href="news.html" class="nav-link active">Yangiliklar</a></li>
                <li><a href="events.html" class="nav-link">Tadbirlar</a></li>
                <li><a href="privileges.html" class="nav-link">Imtiyozlar</a></li>
                <li><a href="legislation.html" class="nav-link">Qonunchilik</a></li>
                <li><a href="gallery.html" class="nav-link">Galereya</a></li>
            </ul>
            <a href="admin.html" class="btn nav-btn">🔒 Admin Panel</a>
        </div>
    </header>

    <!-- Main Content Section -->
    <section class="section">
        <div class="container">
            <div id="detailContainer">
                <div style="text-align: center; padding: 60px 0; color: var(--text-muted);">Yuklanmoqda...</div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 UzeltexKasaba. Barcha huquqlar himoyalangan.</p>
                <p>Ishlab chiquvchi: Antigravity AI</p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                loadNewsDetail(id);
            } else {
                showError("Yangilik tanlanmagan.");
            }
        });

        async function loadNewsDetail(id) {
            const container = document.getElementById('detailContainer');
            try {
                const response = await fetch(`/api/news/${id}`);
                if (response.ok) {
                    const news = await response.json();
                    
                    // Update document title
                    document.title = `${news.title} - UzeltexKasaba`;
                    
                    const date = new Date(news.created_at).toLocaleDateString('uz-UZ', { day: 'numeric', month: 'long', year: 'numeric' });
                    const imgHtml = news.image_url ? `<img class="detail-img" src="${news.image_url}" alt="${escapeHTML(news.title)}">` : '';
                    
                    container.innerHTML = `
                        <div class="detail-wrapper">
                            ${imgHtml}
                            <div class="detail-content">
                                <div class="detail-meta">
                                    <span>📅 ${date}</span>
                                    <span>🏷️ Faoliyat</span>
                                </div>
                                <h1 class="detail-title">${escapeHTML(news.title)}</h1>
                                <div class="detail-body">${escapeHTML(news.content)}</div>
                                <div class="back-btn-container">
                                    <a href="news.html" class="btn btn-secondary">⬅️ Barcha yangiliklarga qaytish</a>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    showError("Yangilik topilmadi yoki o'chirib yuborilgan.");
                }
            } catch (error) {
                console.error(error);
                showError("Server bilan bog'lanishda xatolik yuz berdi.");
            }
        }

        function showError(message) {
            const container = document.getElementById('detailContainer');
            container.innerHTML = `
                <div style="text-align: center; padding: 60px 0;">
                    <div style="font-size: 3rem; margin-bottom: 16px;">⚠️</div>
                    <h3 style="font-family: var(--font-heading); font-size: 1.5rem; color: var(--color-danger); margin-bottom: 8px;">Xatolik</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">${message}</p>
                    <a href="news.html" class="btn btn-primary">Yangiliklar sahifasiga qaytish</a>
                </div>
            `;
        }
    </script>
</body>
</html>
