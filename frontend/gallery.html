<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto va Video Galereya - UzeltexKasaba</title>
    <link rel="stylesheet" href="style.css?v=1.2">
    <style>
        /* Gallery specific styles */
        .gallery-filter {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }
        .gallery-item {
            position: relative;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            cursor: pointer;
            aspect-ratio: 4/3;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform var(--transition-normal);
        }
        .gallery-item:hover img {
            transform: scale(1.05);
        }
        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(15, 41, 99, 0.85));
            padding: 16px 20px;
            color: white;
            opacity: 0;
            transition: opacity var(--transition-fast);
        }
        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }
        .gallery-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--color-accent);
            margin-bottom: 4px;
            display: block;
        }
        .gallery-caption {
            font-size: 0.9rem;
            font-weight: 600;
        }
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-normal);
        }
        .lightbox.open {
            opacity: 1;
            pointer-events: all;
        }
        .lightbox-img {
            max-width: 90%;
            max-height: 80%;
            border-radius: var(--radius-sm);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 3px solid white;
        }
        .lightbox-close {
            position: absolute;
            top: 24px;
            right: 32px;
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
        }
        @media(max-width: 900px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media(max-width: 600px) {
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Header & Navigation -->
    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="images/logo.jpg" alt="UzeltexKasaba Logo" style="height: 42px; width: 42px; object-fit: contain; border-radius: 50%;">
                <span>UzeltexKasaba</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link" data-i18n="nav_home">Bosh sahifa</a></li>
                <li><a href="about.html" class="nav-link" data-i18n="nav_about">Haqimizda</a></li>
                <li><a href="news.html" class="nav-link" data-i18n="nav_news">Yangiliklar</a></li>
                <li><a href="events.html" class="nav-link" data-i18n="nav_events">Tadbirlar</a></li>
                <li><a href="privileges.html" class="nav-link" data-i18n="nav_privileges">Imtiyozlar</a></li>
                <li><a href="legislation.html" class="nav-link" data-i18n="nav_legislation">Qonunchilik</a></li>
                <li><a href="gallery.html" class="nav-link active" data-i18n="nav_gallery">Galereya</a></li>
            </ul>
            <div class="lang-switcher" style="margin-left: 12px; display: flex; align-items: center;">
                <select class="lang-select" style="background-color: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border-color); border-radius: var(--radius-sm); padding: 4px 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; outline: none; transition: border-color 0.2s;">
                    <option value="uz">🇺🇿 UZ</option>
                    <option value="ru">🇷🇺 RU</option>
                    <option value="en">🇬🇧 EN</option>
                </select>
            </div>
            <a href="https://t.me/uzeltexkasaba" target="_blank" style="display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 50%; background-color: var(--color-primary); color: white; text-decoration: none; transition: background-color 0.2s; margin-left: 12px;" onmouseover="this.style.backgroundColor='#0088cc'" onmouseout="this.style.backgroundColor='var(--color-primary)'" title="Telegram">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </a>
        </div>
    </header>

    <!-- Page Title -->
    <section class="section section-secondary" style="padding: 60px 0;">
        <div class="container">
            <h1 style="font-family: var(--font-heading); font-size: 2.5rem; font-weight: 700; margin-bottom: 8px;" data-i18n="gallery_page_title">Foto va Video Galereya</h1>
            <p style="color: var(--text-secondary);" data-i18n="gallery_page_subtitle">Kasaba uyushmasi hayoti, tadbirlar va dam olish maskanlaridan jonli lavhalar.</p>
        </div>
    </section>

    <!-- Gallery Content -->
    <section class="section">
        <div class="container">
            <!-- Filter Bar -->
            <div class="gallery-filter">
                <button class="filter-btn active" data-filter="all" data-i18n="gallery_filter_all">Barchasi</button>
                <button class="filter-btn" data-filter="tadbirlar" data-i18n="gallery_filter_events">Tadbirlar & Loyihalar</button>
                <button class="filter-btn" data-filter="sanatoriy" data-i18n="gallery_filter_resorts">Sanatoriylar</button>
                <button class="filter-btn" data-filter="sport" data-i18n="gallery_filter_sports">Sport O'yinlari</button>
            </div>

            <!-- Grid -->
            <div class="gallery-grid" id="galleryGrid">
                <!-- Loaded dynamically -->
            </div>
        </div>
    </section>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
        <img id="lightboxImg" class="lightbox-img" src="" alt="Full size view">
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
                <p>&copy; 2026 UzeltexKasaba. <span data-i18n="footer_rights">Barcha huquqlar himoyalangan.</span></p>
                <a href="https://t.me/uzeltexkasaba" target="_blank" style="display: flex; align-items: center; gap: 8px; color: var(--color-primary); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s;" onmouseover="this.style.opacity='0.8'" onmouseout="this.style.opacity='1'">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                    <span data-i18n="footer_telegram">Telegram kanalimiz</span>
                </a>
            </div>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="app.js"></script>
    <script>
        const galleryItemsData = [
            { id: 1, image: 'images/union_hero_bg.jpg', category: 'tadbirlar', tagKey: 'gallery_filter_events', captionKey: 'gallery_cap_1' },
            { id: 2, image: 'images/union_hero_bg.jpg', category: 'sanatoriy', tagKey: 'gallery_filter_resorts', captionKey: 'gallery_cap_2' },
            { id: 3, image: 'images/union_hero_bg.jpg', category: 'sport', tagKey: 'gallery_filter_sports', captionKey: 'gallery_cap_3' },
            { id: 4, image: 'images/union_hero_bg.jpg', category: 'tadbirlar', tagKey: 'gallery_filter_events', captionKey: 'gallery_cap_4' },
            { id: 5, image: 'images/union_hero_bg.jpg', category: 'sanatoriy', tagKey: 'gallery_filter_resorts', captionKey: 'gallery_cap_5' },
            { id: 6, image: 'images/union_hero_bg.jpg', category: 'sport', tagKey: 'gallery_filter_sports', captionKey: 'gallery_cap_6' }
        ];

        let activeFilter = 'all';

        document.addEventListener('DOMContentLoaded', () => {
            renderGallery();

            // Gallery filter logic
            const filterBtns = document.querySelectorAll('.gallery-filter .filter-btn');
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    activeFilter = btn.getAttribute('data-filter');
                    applyFilter();
                });
            });
        });

        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            if (!grid) return;

            const currentLang = typeof getCurrentLanguage === 'function' ? getCurrentLanguage() : 'uz';

            grid.innerHTML = galleryItemsData.map(item => {
                const tag = (translations[currentLang] && translations[currentLang][item.tagKey]) || item.category;
                const caption = (translations[currentLang] && translations[currentLang][item.captionKey]) || '';

                return `
                    <div class="gallery-item" data-category="${item.category}" onclick="openLightbox('${item.image}', '${escapeHTML(caption)}')">
                        <img src="${item.image}" alt="${escapeHTML(caption)}">
                        <div class="gallery-overlay">
                            <span class="gallery-tag">${escapeHTML(tag)}</span>
                            <span class="gallery-caption">${escapeHTML(caption)}</span>
                        </div>
                    </div>
                `;
            }).join('');

            applyFilter();
        }

        function applyFilter() {
            const items = document.querySelectorAll('.gallery-item');
            items.forEach(item => {
                if (activeFilter === 'all' || item.getAttribute('data-category') === activeFilter) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // Lightbox Functions
        function openLightbox(src, caption) {
            const lightbox = document.getElementById('lightbox');
            const img = document.getElementById('lightboxImg');
            img.src = src;
            lightbox.classList.add('open');
        }

        // Expose renderGallery globally for app.js language switcher hook
        window.renderGallery = renderGallery;

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
        }
    </script>
</body>
</html>
